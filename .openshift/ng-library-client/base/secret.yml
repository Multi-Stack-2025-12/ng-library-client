apiVersion: v1
kind: Secret
metadata:
  name: ng-library-client-secret
type: Opaque
stringData:
  PORT: "4000"

  # Runtime client configuration rendered by entrypoint.sh
  LIBRARY_URL: https://library-service__OPENSHIFT_NAME_SUFFIX__.apps.__OPENSHIFT_DOMAIN__/api/v1
  OTEL_COLLECTOR_ENDPOINT: https://otel-collector__OPENSHIFT_NAME_SUFFIX__.apps.__OPENSHIFT_DOMAIN__/v1/traces
  TELEMETRY_HTTP_CAPTURE_DETAILS: "true"
  TELEMETRY_HTTP_MAX_ATTRIBUTE_LENGTH: "4000"
  TELEMETRY_HTTP_RESPONSE_BODY_MAX_LENGTH: "2000"

  # OIDC / IDP
  IDP_ISSUER: https://keycloak__OPENSHIFT_NAME_SUFFIX__.apps.__OPENSHIFT_DOMAIN__/realms/multi-stack
  IDP_CLIENT_ID: multi-stack-ng
  IDP_REDIRECT_URI: https://ng-library-client__OPENSHIFT_NAME_SUFFIX__.apps.__OPENSHIFT_DOMAIN__/security/auth/callback
  IDP_RESPONSE_TYPE: code
  IDP_SCOPE: openid profile email offline_access scp-multi-stack-ng
  IDP_POST_LOGOUT_REDIRECT_URI: https://ng-library-client__OPENSHIFT_NAME_SUFFIX__.apps.__OPENSHIFT_DOMAIN__
  IDP_STRICT_DISCOVERY_DOCUMENT_VALIDATION: "false"
  IDP_SHOW_DEBUG_INFORMATION: "false"
  IDP_REQUIRE_HTTPS: "true"